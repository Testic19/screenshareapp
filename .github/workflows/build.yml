name: Build installers

# Pokreće se ručno (dugme "Run workflow") ili kad gurneš tag npr. v0.1.0
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        # --publish never: samo napravi instalere; objavu radi zaseban "release" job.
        run: npx electron-builder --publish never
        env:
          # Ne pokušavaj da potpišeš mac build (nemamo Apple sertifikat).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScreenShareP2P-${{ matrix.name }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: ignore

  # Build the Go TURN server as ready-to-run Linux binaries (amd64 + arm64).
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build server binaries
        working-directory: server
        run: |
          mkdir -p ../dist-server
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../dist-server/turnserver-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../dist-server/turnserver-linux-arm64 .

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: turnserver
          path: dist-server/*

  # Kad gurneš tag v*, automatski napravi GitHub Release sa instalerima + serverom.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
